<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuning Day Cazis 2026 – Abstimmung</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #e63a2e;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(230,58,46,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.06) 0%, transparent 50%);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 2.5rem;
    text-transform: uppercase;
  }

  .logo span { color: var(--accent); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #fff 40%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Input mode */
  #inputMode { display: block; }
  #confirmMode { display: none; }
  #doneMode { display: none; }

  label {
    display: block;
    text-align: left;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    text-align: center;
    padding: 1rem;
    letter-spacing: 4px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    margin-top: 1.5rem;
    padding: 1rem;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-top: 0.75rem;
    font-size: 1rem;
  }
  .btn-secondary:hover { border-color: var(--text); color: var(--text); }

  /* Confirm */
  .big-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 6rem;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .confirm-text {
    color: var(--muted);
    margin: 0.5rem 0 1.5rem;
    font-size: 0.95rem;
  }

  /* Done */
  .checkmark {
    font-size: 4rem;
    margin-bottom: 1rem;
    animation: pop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }

  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  .done-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    letter-spacing: 2px;
  }

  .done-sub {
    color: var(--muted);
    margin-top: 0.5rem;
    font-size: 0.9rem;
  }

  .voted-for {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .voted-for span {
    color: var(--accent2);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
  }

  .error {
    color: var(--accent);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    min-height: 1.2em;
  }

  .footer {
    margin-top: 2rem;
    color: var(--border);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="logo">TUNING DAY <span>CAZIS</span> · 2026</div>

<div class="card">

  <!-- Step 1: Input -->
  <div id="inputMode">
    <h1>VOTE</h1>
    <p class="subtitle">Gib die Teilnehmernummer ein</p>
    <label for="carNum">Teilnehmernummer</label>
    <input type="number" id="carNum" placeholder="001" min="1" max="999" />
    <div class="error" id="errMsg"></div>
    <button class="btn btn-primary" onclick="goConfirm()">WEITER →</button>
  </div>

  <!-- Step 2: Confirm -->
  <div id="confirmMode">
    <p class="subtitle">Du stimmst ab für</p>
    <div class="big-number" id="confirmNum">—</div>
    <p class="confirm-text">Ist das die richtige Nummer?</p>
    <button class="btn btn-primary" onclick="submitVote()">✓ JA, ABSTIMMEN</button>
    <button class="btn btn-secondary" onclick="goBack()">← Zurück</button>
  </div>

  <!-- Step 3: Done -->
  <div id="doneMode">
    <div class="checkmark">🏁</div>
    <div class="done-title">DANKE!</div>
    <p class="done-sub">Deine Stimme wurde gezählt.</p>
    <div class="voted-for">Abgestimmt für Teilnehmer Nr. <span id="votedNum">—</span></div>
  </div>

</div>

<div class="footer">1 Stimme pro Gerät</div>

<script>
  const STORAGE_KEY = 'tuningday_cazis_voted_2026';
  const API_BASE = window.location.origin;

  // Check if already voted
  window.addEventListener('load', () => {
    const voted = localStorage.getItem(STORAGE_KEY);
    if (voted) {
      document.getElementById('inputMode').style.display = 'none';
      document.getElementById('doneMode').style.display = 'block';
      document.getElementById('votedNum').textContent = voted;
    }

    // Pre-fill from URL param ?auto=42
    const params = new URLSearchParams(window.location.search);
    if (params.get('auto')) {
      document.getElementById('carNum').value = params.get('auto');
    }
  });

  function goConfirm() {
    const val = parseInt(document.getElementById('carNum').value);
    const err = document.getElementById('errMsg');
    if (!val || val < 1 || val > 999) {
      err.textContent = 'Bitte eine gültige Nummer eingeben.';
      return;
    }
    err.textContent = '';
    document.getElementById('confirmNum').textContent = String(val).padStart(3, '0');
    document.getElementById('inputMode').style.display = 'none';
    document.getElementById('confirmMode').style.display = 'block';
  }

  function goBack() {
    document.getElementById('confirmMode').style.display = 'none';
    document.getElementById('inputMode').style.display = 'block';
  }

  async function submitVote() {
    const num = parseInt(document.getElementById('confirmNum').textContent);

    // Save to localStorage
    localStorage.setItem(STORAGE_KEY, num);

    // Save vote to shared storage via artifact API (simulated here)
    try {
      // Post to rangliste via BroadcastChannel (same device demo)
      const bc = new BroadcastChannel('autotreffen_votes');
      bc.postMessage({ car: num });
      bc.close();
    } catch(e) {}

    // Show done
    document.getElementById('confirmMode').style.display = 'none';
    document.getElementById('doneMode').style.display = 'block';
    document.getElementById('votedNum').textContent = String(num).padStart(3, '0');
  }
</script>
</body>
</html>
